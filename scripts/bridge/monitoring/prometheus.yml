global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/bridge-alerts.yml

scrape_configs:
  - job_name: hyperlane-validator
    static_configs:
      - targets:
          - validator:9090

  - job_name: hyperlane-relayer
    static_configs:
      - targets:
          - relayer:9091

  - job_name: og-evm-bridge
    static_configs:
      - targets:
          - bridge-metrics:9300
