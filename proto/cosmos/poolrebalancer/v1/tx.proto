syntax = "proto3";
package cosmos.poolrebalancer.v1;

import "amino/amino.proto";
import "cosmos/poolrebalancer/v1/poolrebalancer.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/cosmos/evm/x/poolrebalancer/types";

// Msg defines the poolrebalancer Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams is a governance operation for updating the x/poolrebalancer module parameters.
  // The authority is the Cosmos SDK x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
}

// MsgUpdateParams defines a Msg for updating the x/poolrebalancer module parameters.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "cosmos/poolrebalancer/v1/MsgUpdateParams";

  // authority is the address of the governance account.
  string authority = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];

  // params defines the x/poolrebalancer parameters to update.
  // NOTE: All parameters must be supplied.
  Params params = 2
      [ (gogoproto.nullable) = false, (amino.dont_omitempty) = true ];
}

// MsgUpdateParamsResponse defines the response structure for executing a MsgUpdateParams message.
message MsgUpdateParamsResponse {}

