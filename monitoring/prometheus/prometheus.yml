global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "cometbft"
    metrics_path: /metrics
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/og-evm-nodes.json
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        regex: "(.+):.*"
        target_label: __address__
        replacement: "${1}:26660"

  - job_name: "geth-metrics"
    metrics_path: /metrics
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/geth-metrics.json
        refresh_interval: 30s

  - job_name: "json-rpc-metrics"
    metrics_path: /debug/metrics/prometheus
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/json-rpc-metrics.json
        refresh_interval: 30s

  - job_name: "node-exporter"
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/node-exporters.json
        refresh_interval: 30s
